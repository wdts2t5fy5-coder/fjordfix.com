<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="FjordFix AS er midlertidig nede for vedlikehold. Vi er snart tilbake." />
  <title>FjordFix AS | Vedlikehold</title>
  <style>
    :root{
      --orange:#ff6a00;
      --orange2:#ff8a33;
      --ink:#0f172a;
      --muted:#475569;
      --bg:#ffffff;
      --card:#ffffff;
      --line:rgba(15,23,42,.12);
      --text:rgba(15,23,42,.86);
      --shadow:0 18px 60px rgba(15,23,42,.12);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial;
      color:var(--ink);
      background:
        radial-gradient(1200px 600px at 15% -10%, rgba(255,106,0,.22), transparent 60%),
        radial-gradient(900px 500px at 90% 0%, rgba(255,138,51,.14), transparent 55%),
        var(--bg);
      display:grid;
      place-items:center;
      padding:32px 20px;
    }
    main{
      width:min(760px, 100%);
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      padding:40px clamp(22px, 4vw, 48px);
      box-shadow:var(--shadow);
      text-align:center;
    }
    .logo{
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      gap:10px;
      margin-bottom:20px;
    }
    .logo img{
      height:86px;
      width:auto;
      display:block;
    }
    .logo .text-logo{
      height:42px;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,106,0,.10);
      color:#b54708;
      font-weight:800;
      letter-spacing:.2px;
      margin-bottom:72px;
    }
    h1{
      margin:0 0 10px;
      font-size:clamp(28px, 4.2vw, 40px);
      line-height:1.08;
    }
    p{
      margin:10px auto 0;
      max-width:60ch;
      color:var(--text);
      font-size:17px;
      line-height:1.6;
    }
    .actions{
      margin-top:26px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 16px;
      border-radius:14px;
      text-decoration:none;
      font-weight:800;
      border:1px solid var(--line);
      color:var(--ink);
      background:#fff;
    }
    .btn-primary{
      border:none;
      color:#0b1220;
      background:linear-gradient(135deg,var(--orange),var(--orange2));
    }
    .foot{
      margin-top:22px;
      font-size:14px;
      color:var(--muted);
    }
  </style>
</head>
<body>
  <main role="main" aria-labelledby="title">
    <div class="logo">
      <img src="Logo.png" alt="FjordFix AS" />
      <img class="text-logo" src="Text_logo.png" alt="FjordFix" />
    </div>
    <div class="badge" aria-hidden="true">Midlertidig utilgjengeleg</div>
    <h1 id="title">Me gjer litt vedlikehald</h1>
    <p>
      Nettstaden vår er mellombels nede medan me oppdaterer og forbetrar ting i bakgrunnen.
      Takk for tolmodet – me er snart tilbake.
    </p>
    <p>
      Treng du hjelp no, kan du ringe oss eller sende e-post.
    </p>
    <div class="actions">
      <a class="btn btn-primary" href="tel:+4748265364">Ring 48 26 53 64</a>
      <a class="btn" href="mailto:krister.dyrkolbotn@icloud.com">Send e-post</a>
    </div>
    <div class="foot">FjordFix AS</div>
  </main>
</body>
</html>
