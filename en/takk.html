<style>
    :root{--orange:#165A74;--orange2:#165A74;--ink:#0f172a;--muted:#475569;--bg:#ffffff;--card:#ffffff;--line:rgba(15,23,42,.12);--shadow:0 18px 60px rgba(15,23,42,.12)}
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:"Poppins",ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial;color:var(--ink);background:var(--bg)}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px}
    .card{max-width:640px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:28px;text-align:center}
    .logo-stack{display:grid;gap:10px;justify-items:center;margin-bottom:18px}
    .logo-mark{width:120px;height:120px;display:grid;place-items:center}
    .logo-mark img{width:100%;height:100%;object-fit:contain;display:block}
    .logo-text img{height:64px;width:auto;display:block}
    h1{margin:0 0 10px;font-size:28px}
    p{margin:0;color:var(--muted);line-height:1.6}
    .actions{margin-top:18px;display:flex;justify-content:center}
    .confetti-field{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:20}
    .confetti-field span{position:absolute;top:-10vh;opacity:.9;animation-name:confetti-fall,confetti-drift;animation-timing-function:linear, ease-in-out;animation-iteration-count:1,1}
    @keyframes confetti-fall{to{transform:translateY(120vh)}}
    @keyframes confetti-drift{to{margin-left:40px}}
    .confetti-strip{position:absolute;left:16px;right:16px;height:12px;border-radius:999px;background:#e2e8f0;opacity:.7}
    .confetti-top{top:-6px}
    .confetti-bottom{bottom:-6px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;border:1px solid var(--line);padding:12px 16px;border-radius:14px;text-decoration:none;font-weight:800;background:linear-gradient(135deg,var(--orange),var(--orange2));color:#ffffff}
  </style>

<body>
  <div class="card">
    <div class="logo-stack" aria-hidden="true">
      <div class="logo-mark">
        <img src="../Logo.png" alt="" />
      </div>
      <div class="logo-text">
        <img src="../Text_logo.png" alt="" />
      </div>
    </div>
    <h1>Thank you for your request</h1>
    <p>We will review your request and get back to you as soon as we can.</p>
    <div class="actions">
      <a class="btn" href="index.html">Back to homepage</a>
    </div>
    <div class="confetti-strip confetti-top" aria-hidden="true"></div>
    <div class="confetti-strip confetti-bottom" aria-hidden="true"></div>
  </div>
  <div class="confetti-field" aria-hidden="true"></div>
  <script>
    const confettiField = document.querySelector('.confetti-field');
    const colors = ['#165A74', '#ffd400', '#14b8a6', '#38bdf8', '#f472b6'];
    const count = 90;
    if (confettiField) {
      for (let i = 0; i < count; i += 1) {
        const piece = document.createElement('span');
        const size = 6 + Math.random() * 6;
        piece.style.width = `${size}px`;
        piece.style.height = `${size * 0.6}px`;
        piece.style.background = colors[i % colors.length];
        piece.style.left = `${Math.random() * 100}%`;
        piece.style.animationDelay = `${Math.random() * 0.6}s`;
        piece.style.animationDuration = `${2.2 + Math.random() * 0.8}s`;
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        confettiField.appendChild(piece);
      }
      setTimeout(() => {
        confettiField.innerHTML = '';
      }, 3200);
    }
  </script>
