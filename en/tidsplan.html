<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<title>FjordFix | Tidsplan</title>
  <style>
    :root{--orange:#165A74;--ink:#0f172a;--muted:#475569;--line:rgba(15,23,42,.12);--surface-04:rgba(15,23,42,.06);--shadow:0 18px 60px rgba(15,23,42,.12);--bg:#ffffff;--card:#ffffff;--panel:#ffffff}
    *{box-sizing:border-box}
    body{margin:0;font-family:"Poppins",ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial;color:var(--ink);background:var(--bg)}
    html[data-theme="dark"]{color-scheme:dark;--bg:#000000;--card:#0a0a0a;--panel:#0a0a0a;--ink:#ffffff;--muted:rgba(255,255,255,.72);--line:rgba(255,255,255,.12);--surface-04:rgba(255,255,255,.06);--shadow:0 18px 60px rgba(0,0,0,.28)}
    a{color:inherit}
    body{min-height:100vh;display:flex;flex-direction:column}
    main{flex:1}

    .wrap{max-width:1500px;margin:0 auto;padding:0 28px}
    .wrap-wide{max-width:100%;padding:0 24px}

    .nav{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.95);border-bottom:0;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:none}
    .nav::after{display:none}
    .nav .wrap{max-width:1320px}
    .nav-inner{display:flex;align-items:center;justify-content:flex-start;padding:18px 0;gap:14px}
    .brand{display:grid;grid-template-columns:1fr 180px;align-items:center;font-weight:800;letter-spacing:.2px;width:100%}
    .brand-left{display:flex;align-items:center;gap:16px}
    .brand-link{display:inline-flex;align-items:center;text-decoration:none}
    .brand-title{display:flex;align-items:center;justify-content:flex-start;height:112px}
    .brand-title img{height:88px;width:auto;display:block}
    .nav-menu{display:flex;align-items:center;justify-content:flex-end;position:relative;gap:12px}
    .nav-menu-stack{display:flex;flex-direction:row;gap:8px;align-items:center}
    .lang-panel{position:absolute;top:56px;right:calc(100% + 6px);min-width:220px;background:#f7fbfe;border:1px solid rgba(15,23,42,.12);border-radius:14px;padding:8px;box-shadow:var(--shadow);display:grid;gap:6px}
    .lang-panel[hidden]{display:none}
    .lang-panel a{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;text-decoration:none;font-weight:700;color:#0f172a}
    .lang-panel a:hover{background:var(--surface-04)}
    .lang-panel .flag-no{width:48px;height:48px;flex:0 0 48px;border-radius:12px}
    .lang-panel .flag-uk{display:block;width:48px;height:48px;flex:0 0 48px;border-radius:12px}

    .flag-uk{display:block;width:100%;height:100%;border:2px solid #ffffff;border-radius:inherit;background-size:100% 100%;background-repeat:no-repeat;background-position:center;background-image:url('../flag-uk.svg');}

    .lang-button{padding:0;overflow:hidden}
    .flag-no{display:block;width:100%;height:100%;border:2px solid #ffffff;border-radius:inherit;background:linear-gradient(90deg, transparent 43%, #00205b 43% 57%, transparent 57%),linear-gradient(180deg, transparent 43%, #00205b 43% 57%, transparent 57%),linear-gradient(90deg, transparent 38%, #ffffff 38% 62%, transparent 62%),linear-gradient(180deg, transparent 38%, #ffffff 38% 62%, transparent 62%),#ba0c2f;}
    .menu-button{width:48px;height:48px;border-radius:12px;border:2px solid rgba(15,23,42,.12);background:#f7fbfe;display:grid;place-items:center;cursor:pointer}
    .menu-button:hover{background:var(--surface-04)}
    .menu-icon{position:relative;width:22px;height:14px}
    .menu-icon::before,
    .menu-icon::after,
    .menu-icon span{content:"";position:absolute;left:0;width:100%;height:2px;background:#0f172a;border-radius:2px}
    .menu-icon::before{top:0}
    .menu-icon span{top:6px}
    .menu-icon::after{bottom:0}
    .menu-panel{position:absolute;top:56px;right:calc(100% + 6px);min-width:220px;background:#f7fbfe;border:1px solid rgba(15,23,42,.12);border-radius:14px;padding:8px;box-shadow:var(--shadow);display:grid;gap:4px}
    .menu-panel[hidden]{display:none}
    .menu-panel a{padding:10px 12px;border-radius:10px;text-decoration:none;font-weight:700;color:#0f172a}
    .menu-panel a:hover{background:var(--surface-04)}
    .mark{width:110px;height:110px;display:grid;place-items:center}
    .mark img{width:100%;height:100%;object-fit:contain;object-position:center;display:block}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;border:1px solid rgba(15,23,42,.12);padding:12px 14px;border-radius:14px;text-decoration:none;font-weight:800;background:transparent;color:inherit}
    .btn-ghost{background:var(--surface-04)}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    .theme-toggle{padding:10px 12px;border:none;border-radius:999px;min-width:48px;min-height:48px;background:transparent;color:#0f172a;transition:transform .2s ease}
    .theme-toggle:hover{transform:translateY(-1px);background:transparent}
    .theme-toggle .bulb-wrap{position:relative;width:38px;height:38px;transform:translateY(0)}
    .theme-toggle svg{position:absolute;inset:0;width:100%;height:100%;transition:opacity .2s ease, transform .2s ease}
    html.theme-switching,
    html.theme-switching body,
    html.theme-switching .nav,
    html.theme-switching .hero,
    html.theme-switching .service-spotlight,
    html.theme-switching .section-title h2,
    html.theme-switching .sub,
    html.theme-switching .note,
    html.theme-switching .btn,
    html.theme-switching .menu-button,
    html.theme-switching .lang-button,
    html.theme-switching .lang-panel,
    html.theme-switching .menu-panel,
    html.theme-switching .footer{transition:background-color .42s ease, color .42s ease, border-color .42s ease, box-shadow .42s ease, opacity .42s ease}
    .theme-toggle .bulb-outline{stroke:var(--bulb-stroke);stroke-width:4.4;stroke-linecap:round;stroke-linejoin:round}
    .theme-toggle .bulb-fill{fill:var(--bulb-fill)}
    .theme-toggle .bulb-base{fill:var(--bulb-base)}
    .theme-toggle .bulb-screw{fill:var(--bulb-base)}
    .theme-toggle .bulb-tip{fill:var(--bulb-base)}
    .theme-toggle .bulb-highlight{fill:none;stroke:rgba(255,255,255,.7);stroke-width:5;stroke-linecap:round}
    .theme-toggle .filament{fill:none;stroke:var(--bulb-stroke);stroke-width:3.2;stroke-linecap:round;stroke-linejoin:round}
    .theme-toggle .bulb-crack{fill:none;stroke:var(--bulb-stroke);stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
    .theme-toggle .bulb-shard{fill:var(--bulb-fill);stroke:var(--bulb-stroke);stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
    .theme-toggle[data-state="on"]{--bulb-fill:#ffd400;--bulb-stroke:#0f172a;--bulb-base:#7b8aa6}
    .theme-toggle[data-state="on"] svg{filter:none}
    .theme-toggle[data-state="off"]{--bulb-fill:rgba(15,23,42,.08);--bulb-stroke:rgba(15,23,42,.55);--bulb-base:#6f7d96}
    .theme-toggle[data-state="off"] .bulb-highlight{stroke:rgba(15,23,42,.2)}
    .theme-toggle[data-state="off"] svg{transform:scale(.96)}
    .theme-toggle[data-state="off"][data-broken="true"]{--bulb-fill:rgba(255,255,255,.22);--bulb-stroke:#ffffff;--bulb-base:#7b8aa6}
    .theme-toggle[data-state="off"][data-broken="true"] .bulb-highlight{stroke:rgba(255,255,255,.72)}
    .theme-toggle[data-state="off"][data-broken="true"] .bulb-broken{filter:drop-shadow(0 2px 4px rgba(0,0,0,.35))}
.theme-toggle[data-state="off"][data-broken="true"] .bulb-base,
    .theme-toggle[data-state="off"][data-broken="true"] .bulb-tip{fill:#6f7d96;stroke:#6f7d96}
    .theme-toggle[data-state="off"][data-broken="true"] .bulb-screw{fill:#6f7d96;stroke:#334155}
    .theme-toggle .bulb-broken{opacity:0}
    .theme-toggle[data-broken="true"] .bulb-full{opacity:0}
    .theme-toggle[data-broken="true"] .bulb-broken{opacity:1;transform:translate(14px,22px) rotate(18deg)}

    html[data-theme="dark"] .nav{background:rgba(0,0,0,.92);border-bottom:0}
    html[data-theme="dark"] .nav::after{display:none}
    html[data-theme="dark"] .lang-panel,
    html[data-theme="dark"] .menu-panel{background:var(--card);border-color:var(--line)}
    html[data-theme="dark"] .lang-panel a,
    html[data-theme="dark"] .menu-panel a{color:#ffffff}
    html[data-theme="dark"] .theme-toggle{color:var(--ink)}
    html[data-theme="dark"] .menu-button{border-color:rgba(255,255,255,.78);background:transparent}
    html[data-theme="dark"] .menu-icon::before,
    html[data-theme="dark"] .menu-icon::after,
    html[data-theme="dark"] .menu-icon span{background:#ffffff}
    html[data-theme="dark"] .flag-no,
    html[data-theme="dark"] .flag-uk{border-color:var(--bg)}
    html[data-theme="dark"] .lang-panel .flag-no,
    html[data-theme="dark"] .lang-panel .flag-uk{border-color:#ffffff;border-width:2px}

    h1{margin:28px 0 8px;font-size:34px}
    p{margin:0 0 16px;color:var(--muted);line-height:1.6}
    .section{padding:24px 0}
    .footer{padding:26px 0 36px;border-top:1px solid var(--line);margin-top:28px;color:var(--muted)}

    .card{border:1px solid var(--line);border-radius:18px;padding:18px;background:var(--card);box-shadow:0 12px 32px rgba(15,23,42,.08);width:100%}
    .table-wrap{overflow:auto}
    table{width:100%;border-collapse:collapse;min-width:900px}
    .schedule-wrap{overflow:auto}
    .schedule-grid{min-width:900px}
    th,td{padding:12px 10px;border-bottom:0;text-align:left;vertical-align:top}
    th{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
    select.status{padding:8px 10px;border-radius:10px;border:1px solid var(--line);background:#ffffff;color:var(--ink);font-weight:700}
    .date-input,.time-input{padding:8px 10px;border-radius:10px;border:1px solid var(--line);background:#ffffff;color:var(--ink)}
    .warn{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#dc2626;color:#ffffff;font-size:12px;font-weight:800;margin-left:6px;opacity:0}
    .warn.is-visible{opacity:1}
    .empty{padding:18px;border-radius:14px;background:var(--surface-04);color:var(--muted);text-align:center}
    .schedule-header{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:12px}
    .schedule-nav{display:flex;align-items:center;gap:8px}
    .schedule-nav button{border:1px solid var(--line);background:var(--surface-04);border-radius:10px;padding:8px 12px;font-weight:700;cursor:pointer}
    .month-card{margin-bottom:24px}
    .month-header{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:12px}
    .month-nav{display:flex;align-items:center;gap:8px}
    .month-nav button{border:1px solid var(--line);background:var(--surface-04);border-radius:10px;padding:8px 12px;font-weight:700;cursor:pointer}
    .month-wrap{overflow:auto}
    .month-grid{min-width:900px;display:grid;gap:8px;margin-top:12px}
    .month-row{display:grid;grid-template-columns:80px repeat(7,minmax(120px,1fr));gap:8px}
    .month-row.month-head{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
    .month-week-number{width:100%;border:1px solid var(--line);background:var(--surface-04);border-radius:10px;padding:10px 8px;font-weight:800;cursor:pointer;text-align:center}
    .month-week-number:hover{background:rgba(15,23,42,.08)}
    .month-day{border:1px solid var(--line);border-radius:12px;padding:8px;min-height:92px;background:var(--card)}
    .month-day.is-outside{background:var(--surface-04);color:var(--muted)}
    .month-day-number{font-weight:800;font-size:13px;margin-bottom:6px}
    .month-events{display:grid;gap:4px}
    .month-event{font-size:12px;padding:4px 6px;border-radius:8px;background:rgba(22,90,116,.16);color:var(--ink);font-weight:600}
    .month-event.is-invoiced{background:var(--surface-04)}
    .month-event.month-more{background:transparent;border:1px dashed var(--line);color:var(--muted);font-weight:700;text-align:center}
    .schedule-axis{display:grid;grid-template-columns:320px 1fr;gap:12px;margin:12px 0}
    .schedule-axis-days{display:grid;grid-template-columns:repeat(7,1fr);gap:0}
    .schedule-axis-days span{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);text-align:center;padding:8px 6px;border-radius:10px;cursor:pointer}
    .schedule-axis-days span.is-active{background:var(--surface-04);color:var(--ink);font-weight:700}
    .schedule-row{display:grid;grid-template-columns:320px 1fr;gap:12px;align-items:stretch;margin-bottom:10px}
    .schedule-meta{font-size:14px}
    .schedule-meta strong{display:block;font-size:15px}
    .schedule-meta small{color:var(--muted)}
    .schedule-timeline{position:relative;min-height:44px;border:1px solid var(--line);border-radius:12px;background-image:linear-gradient(to right, rgba(15,23,42,.08) 0, rgba(15,23,42,.08) 1px, transparent 1px);background-size:calc(100% / 7) 100%}
    .schedule-bar{position:absolute;top:4px;left:12px;width:calc(100% - 24px);height:calc(100% - 8px);border-radius:12px;background:var(--orange);color:#ffffff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;padding:0 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .schedule-bar.is-invoiced{background:#ffffff;color:var(--ink);border:1px solid var(--line);box-shadow:none}
    .schedule-empty{padding:14px;border-radius:12px;background:var(--surface-04);color:var(--muted)}
  </style>
</head>

  <script>
    const yearTarget = document.getElementById('y');
    if (yearTarget) {
      yearTarget.textContent = new Date().getFullYear();
    }

    const root = document.documentElement;
    const toggle = document.querySelector('[data-theme-toggle]');
    const storageKey = 'fjordfix-theme';
    const storedTheme = localStorage.getItem(storageKey);
    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    const initialTheme = storedTheme || (prefersDark ? 'dark' : 'light');

    let themeTransitionTimer = null;

    const applyTheme = (theme) => {
      root.classList.add('theme-switching');
      if (themeTransitionTimer) window.clearTimeout(themeTransitionTimer);
      themeTransitionTimer = window.setTimeout(() => root.classList.remove('theme-switching'), 460);
      if (theme === 'dark') {
        root.setAttribute('data-theme', 'dark');
      } else {
        root.removeAttribute('data-theme');
      }
      if (toggle) {
        const isDark = theme === 'dark';
      document.querySelectorAll('[data-logo-light][data-logo-dark]').forEach((logo) => {
        logo.src = theme === 'dark' ? logo.getAttribute('data-logo-dark') : logo.getAttribute('data-logo-light');
      });
        toggle.setAttribute('aria-pressed', isDark);
        toggle.setAttribute('data-state', isDark ? 'off' : 'on');
        const label = isDark ? 'Let there be light' : 'Easy now...';
        toggle.setAttribute('aria-label', label);
        toggle.setAttribute('title', label);
        const isBroken = toggle.getAttribute('data-broken') === 'true';
        const status = toggle.querySelector('[data-theme-status]');
        if (status) {
          status.textContent = isDark ? (isBroken ? 'Pære knust' : 'Lys av') : 'Lys på';
        }
        if (isDark && !isBroken) {
          toggle.setAttribute('data-broken', 'true');
          if (status) {
            status.textContent = 'Pære knust';
          }
        }
        if (!isDark) {
          toggle.removeAttribute('data-broken');
        }
      }
    };

    applyTheme(initialTheme);
    if (toggle) {
      toggle.addEventListener('click', () => {
        const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        applyTheme(next);
      });
    }

    const langToggle = document.querySelector('[data-lang-toggle]');
    const langPanel = document.querySelector('[data-lang-panel]');
    const langKey = 'fjordfix-lang';
    const currentPath = window.location.pathname;
    const normalizePath = (path) => {
      if (!path || path === '/') return '/index.html';
      if (path == '/nn' || path == '/nn/') return '/nn/index.html';
      if (path == '/en' || path == '/en/') return '/en/index.html';
      if (path.endsWith('/')) return `${path.slice(0, -1)}.html`;
      if (!path.endsWith('.html')) return `${path}.html`;
      return path;
    };
    const basePath = normalizePath(currentPath);
    const isFile = window.location.protocol === 'file:';
    const isNn = isFile ? basePath.includes('/nn/') : basePath.startsWith('/nn/');
    const isEn = isFile ? basePath.includes('/en/') : basePath.startsWith('/en/');

    const langIcon = langToggle ? langToggle.querySelector('span') : null;
    if (langIcon) {
      langIcon.classList.remove('flag-no', 'flag-uk');
      langIcon.classList.add(isEn ? 'flag-uk' : 'flag-no');
    }

    const withoutLang = (path) => {
      const normalized = normalizePath(path);
      const stripped = normalized.replace(/^\/(nn|en)(?=\/)/, '');
      return stripped || '/index.html';
    };
    const withLang = (path, lang) => {
      const normalized = normalizePath(path);
      if (lang === 'nb') return withoutLang(normalized);
      const prefix = `/${lang}`;
      if (normalized.startsWith(`${prefix}/`)) return normalized;
      const stripped = withoutLang(normalized);
      return stripped === '/index.html' ? `${prefix}/index.html` : `${prefix}${stripped}`;
    };
    const choiceHref = (choice) => {
      if (!langPanel) return null;
      const link = langPanel.querySelector(`[data-lang-choice="${choice}"]`);
      if (!link) return null;
      const href = link.getAttribute('href');
      return href ? new URL(href, window.location.href).href : null;
    };
    const targetForLang = (choice) => {
      if (isFile) return choiceHref(choice);
      return withLang(basePath, choice);
    };
    const storedLang = localStorage.getItem(langKey);
    if (storedLang === 'nn' && !isNn) {
      const target = targetForLang('nn');
      if (target) window.location.href = target;
    }
    if (storedLang === 'en' && !isEn) {
      const target = targetForLang('en');
      if (target) window.location.href = target;
    }
    if (storedLang === 'nb' && (isNn || isEn)) {
      const target = targetForLang('nb');
      if (target) window.location.href = target;
    }
    const closeLang = () => {
      if (!langToggle || !langPanel) return;
      langToggle.setAttribute('aria-expanded', 'false');
      langPanel.hidden = true;
    };
    if (langToggle && langPanel) {
      langToggle.addEventListener('click', (event) => {
        event.stopPropagation();
        if (menuButton && menuPanel) {
          menuButton.setAttribute('aria-expanded', 'false');
          menuPanel.hidden = true;
        }
        const isOpen = langToggle.getAttribute('aria-expanded') === 'true';
        langToggle.setAttribute('aria-expanded', String(!isOpen));
        langPanel.hidden = isOpen;
      });
      langPanel.addEventListener('click', (event) => {
        const link = event.target.closest('[data-lang-choice]');
        if (!link) return;
        event.preventDefault();
        const choice = link.getAttribute('data-lang-choice');
        localStorage.setItem(langKey, choice);
        const target = targetForLang(choice);
        if (target) window.location.href = target;
      });
      document.addEventListener('click', (event) => {
        if (langPanel.contains(event.target) || langToggle.contains(event.target)) return;
        closeLang();
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') closeLang();
      });
    }

    const menuButton = document.querySelector('[data-menu-toggle]');
    const menuPanel = document.querySelector('[data-menu-panel]');
    const closeMenu = () => {
      if (!menuButton || !menuPanel) return;
      menuButton.setAttribute('aria-expanded', 'false');
      menuPanel.hidden = true;
    };
    if (menuButton && menuPanel) {
      menuButton.addEventListener('click', (event) => {
        event.stopPropagation();
        if (langPanel && langToggle) {
          langToggle.setAttribute('aria-expanded', 'false');
          langPanel.hidden = true;
        }
        const isOpen = menuButton.getAttribute('aria-expanded') === 'true';
        menuButton.setAttribute('aria-expanded', String(!isOpen));
        menuPanel.hidden = isOpen;
      });
      document.addEventListener('click', (event) => {
        if (menuPanel.contains(event.target) || menuButton.contains(event.target)) return;
        closeMenu();
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') closeMenu();
      });
      menuPanel.addEventListener('click', (event) => {
        if (event.target && event.target.tagName === 'A') closeMenu();
      });
    }

    const axisDays = document.querySelector('[data-axis-days]');
    const scheduleRows = document.querySelector('[data-schedule-rows]');
    const weekLabel = document.querySelector('[data-week-label]');
    const weekPrev = document.querySelector('[data-week-prev]');
    const weekNext = document.querySelector('[data-week-next]');
    const monthLabel = document.querySelector('[data-month-label]');
    const monthPrev = document.querySelector('[data-month-prev]');
    const monthNext = document.querySelector('[data-month-next]');
    const monthGrid = document.querySelector('[data-month-grid]');
    const weekCard = document.querySelector('[data-week-card]');
    const sheetsEndpoint = 'https://script.google.com/macros/s/AKfycbxgT4003G2LDXx833XM6TflgXNTvTF78fmY1kZyWh2Q41XKLO9dEPJ2FEJ9rCuRVEA/exec';

    const loadRequests = async () => {
      try {
        const res = await fetch(sheetsEndpoint);
        if (!res.ok) throw new Error('Bad response');
        const data = await res.json();
        const records = Array.isArray(data) ? data : (data.records || []);
        localStorage.setItem('fjordfix-requests', JSON.stringify(records));
        return records;
      } catch (err) {
        const stored = localStorage.getItem('fjordfix-requests');
        return stored ? JSON.parse(stored) : [];
      }
    };
    let requests = [];
    let plannedRows = [];

    const monthNames = [
      'January',
      'February',
      'March',
      'April',
      'May',
      'June',
      'July',
      'August',
      'September',
      'October',
      'November',
      'December'
    ];
    const dayNames = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

    const startOfWeek = (date) => {
      const d = new Date(date);
      const day = (d.getDay() + 6) % 7;
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() - day);
      return d;
    };
    let currentWeek = startOfWeek(new Date());
    let currentMonth = new Date();
    currentMonth.setDate(1);
    currentMonth.setHours(0, 0, 0, 0);

    const formatRange = (date) => {
      const start = new Date(date);
      const end = new Date(date);
      end.setDate(end.getDate() + 6);
      const opts = { day: '2-digit', month: 'short' };
      return `${start.toLocaleDateString('no-NO', opts)} – ${end.toLocaleDateString('no-NO', opts)}`;
    };

    let selectedDayIndex = null;

    const toDateOnly = (date) => new Date(date.getFullYear(), date.getMonth(), date.getDate());

    const isoWeekNumber = (date) => {
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      const dayNum = d.getUTCDay() || 7;
      d.setUTCDate(d.getUTCDate() + 4 - dayNum);
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    };

    const renderAxis = () => {
      if (!axisDays) return;
      axisDays.innerHTML = '';
      for (let i = 0; i < 7; i += 1) {
        const day = new Date(currentWeek);
        day.setDate(day.getDate() + i);
        const label = document.createElement('span');
        label.textContent = day.toLocaleDateString('no-NO', { weekday: 'short', day: 'numeric' });
        if (selectedDayIndex === i) label.classList.add('is-active');
        label.addEventListener('click', () => {
          selectedDayIndex = selectedDayIndex === i ? null : i;
          renderAxis();
          renderSchedule();
        });
        axisDays.appendChild(label);
      }
      if (weekLabel) weekLabel.textContent = formatRange(currentWeek);
    };

    const shortType = (value) => {
      if (!value) return '';
      if (value.toLowerCase().includes('vedlikeholdsavtale')) return 'Avtale';
      if (value.toLowerCase().includes('enkeltoppdrag')) return 'Oppdrag';
      if (value.toLowerCase().includes('maintenance')) return 'Avtale';
      if (value.toLowerCase().includes('one')) return 'Oppdrag';
      return value;
    };
    const shortTypeLetter = (value) => {
      if (!value) return '';
      const lower = value.toLowerCase();
      if (lower.includes('vedlikeholdsavtale') || lower.includes('maintenance')) return 'A';
      if (lower.includes('enkeltoppdrag') || lower.includes('one')) return 'O';
      return '';
    };
    const firstName = (value) => {
      if (!value) return '';
      return String(value).trim().split(/\s+/)[0] || '';
    };

    const renderSchedule = () => {
      if (!scheduleRows) return;
      scheduleRows.innerHTML = '';
      const startHour = 6;
      const endHour = 20;
      const minutesPerDay = (endHour - startHour) * 60;
      const totalMinutes = minutesPerDay * 7;
      const weekStart = new Date(currentWeek);
      const weekEnd = new Date(currentWeek);
      weekEnd.setDate(weekEnd.getDate() + 7);
      const rows = plannedRows
        .filter((item) => item.start && item.slutt)
        .sort((a, b) => {
          const dateDiff = a.startDate - b.startDate;
          if (dateDiff) return dateDiff;
          if (!a.start && !b.start) return 0;
          if (!a.start) return 1;
          if (!b.start) return -1;
          const [ah, am] = a.start.split(':').map(Number);
          const [bh, bm] = b.start.split(':').map(Number);
          return (ah * 60 + am) - (bh * 60 + bm);
        });
      if (!rows.length) {
        scheduleRows.innerHTML = '<div class=\"schedule-empty\">Ingen planlagte oppdrag for denne uken.</div>';
        return;
      }
      rows.forEach((item) => {
        const startDate = new Date(item.startDate);
        const endDate = new Date(item.endDate);
        if (endDate < weekStart || startDate >= weekEnd) return;
        const [sh, sm] = item.start.split(':').map(Number);
        const [eh, em] = item.slutt.split(':').map(Number);
        const startDayIndex = Math.floor((startDate - weekStart) / 86400000);
        const endDayIndex = Math.floor((endDate - weekStart) / 86400000);
        if (selectedDayIndex !== null && (selectedDayIndex < startDayIndex || selectedDayIndex > endDayIndex)) return;
        const clampDay = (value) => Math.max(0, Math.min(6, value));
        const clampTime = (hours, minutes) => Math.min(minutesPerDay, Math.max(0, (hours - startHour) * 60 + minutes));
        const startIndex = clampDay(startDayIndex);
        const endIndex = clampDay(endDayIndex);
        const startTimeMinutes = 0;
        const endTimeMinutes = minutesPerDay;
        const startMinutes = startIndex * minutesPerDay + startTimeMinutes;
        const endMinutes = endIndex * minutesPerDay + endTimeMinutes;
        const left = Math.max(0, startMinutes) / totalMinutes * 100;
        const width = Math.max(0, endMinutes - startMinutes) / totalMinutes * 100;
        if (width <= 0) return;
        const row = document.createElement('div');
        row.className = 'schedule-row';
        row.innerHTML = `
          <div class=\"schedule-meta\">
            <strong>${item.navn || ''}</strong>
            <small>${item.adresse || ''}</small><br>
            <small>${item.tjeneste || ''} · ${shortType(item.type) || ''}</small>
          </div>
          <div class=\"schedule-timeline\">
            <div class=\"schedule-bar ${item.status === 'fakturert' || item.status === 'invoiced' ? 'is-invoiced' : ''}\" style=\"left:${left}%;width:${width}%\">
              ${item.start}–${item.slutt}
            </div>
          </div>
        `;
        scheduleRows.appendChild(row);
      });
      if (!scheduleRows.children.length) {
        scheduleRows.innerHTML = selectedDayIndex !== null
          ? '<div class=\"schedule-empty\">Ingen planlagte oppdrag denne dagen.</div>'
          : '<div class=\"schedule-empty\">Ingen planlagte oppdrag for denne uken.</div>';
      }
    };

    const renderMonth = () => {
      if (!monthGrid) return;
      monthGrid.innerHTML = '';
      const head = document.createElement('div');
      head.className = 'month-row month-head';
      head.innerHTML = `
        <div>Week</div>
        ${dayNames.map((day) => `<div>${day}</div>`).join('')}
      `;
      monthGrid.appendChild(head);
      const monthStart = new Date(currentMonth);
      const gridStart = startOfWeek(monthStart);
      for (let w = 0; w < 6; w += 1) {
        const weekStart = new Date(gridStart);
        weekStart.setDate(gridStart.getDate() + (w * 7));
        const row = document.createElement('div');
        row.className = 'month-row';
        const weekButton = document.createElement('button');
        weekButton.type = 'button';
        weekButton.className = 'month-week-number';
        weekButton.textContent = `Week ${isoWeekNumber(weekStart)}`;
        weekButton.addEventListener('click', () => {
          currentWeek = startOfWeek(weekStart);
          selectedDayIndex = null;
          renderAxis();
          renderSchedule();
          if (weekCard) {
            weekCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        });
        row.appendChild(weekButton);
        for (let d = 0; d < 7; d += 1) {
          const dayDate = new Date(weekStart);
          dayDate.setDate(weekStart.getDate() + d);
          const cell = document.createElement('div');
          cell.className = 'month-day';
          if (dayDate.getMonth() !== currentMonth.getMonth()) {
            cell.classList.add('is-outside');
          }
          const dayNumber = document.createElement('div');
          dayNumber.className = 'month-day-number';
          dayNumber.textContent = String(dayDate.getDate());
          const eventsWrap = document.createElement('div');
          eventsWrap.className = 'month-events';
          const dayOnly = toDateOnly(dayDate);
          const dayTasks = plannedRows
            .filter((item) => dayOnly >= item.startDate && dayOnly <= item.endDate)
            .sort((a, b) => {
              if (!a.start && !b.start) return 0;
              if (!a.start) return 1;
              if (!b.start) return -1;
              const [ah, am] = a.start.split(':').map(Number);
              const [bh, bm] = b.start.split(':').map(Number);
              return (ah * 60 + am) - (bh * 60 + bm);
            });
          dayTasks.slice(0, 3).forEach((item) => {
            const event = document.createElement('div');
            event.className = 'month-event';
            if (item.status === 'fakturert' || item.status === 'invoiced') event.classList.add('is-invoiced');
            const nameLabel = firstName(item.navn);
            const taskLabel = item.tjeneste || '';
            const typeLetter = shortTypeLetter(item.type);
            const typeLabel = typeLetter ? `(${typeLetter})` : '';
            event.textContent = [taskLabel, typeLabel, nameLabel].filter(Boolean).join(' · ');
            eventsWrap.appendChild(event);
          });
          if (dayTasks.length > 3) {
            const more = document.createElement('div');
            more.className = 'month-event month-more';
            more.textContent = `+${dayTasks.length - 3} more`;
            eventsWrap.appendChild(more);
          }
          cell.appendChild(dayNumber);
          cell.appendChild(eventsWrap);
          row.appendChild(cell);
        }
        monthGrid.appendChild(row);
      }
      if (monthLabel) monthLabel.textContent = monthNames[currentMonth.getMonth()];
    };

    const init = async () => {
      requests = await loadRequests();
      plannedRows = requests.reduce((acc, item) => {
        const status = String(item.status || '').toLowerCase();
        const isPlanned = status === 'kontaktet' || status === 'avtalt' || status === 'fakturert';
        const startDateValue = item.startdato || item.dato;
        if (!isPlanned || !startDateValue) return acc;
        const endDateValue = item.sluttdato || startDateValue;
        const startDate = new Date(startDateValue);
        const endDate = new Date(endDateValue);
        startDate.setHours(0, 0, 0, 0);
        endDate.setHours(0, 0, 0, 0);
        acc.push({
          ...item,
          status,
          startDate,
          endDate
        });
        return acc;
      }, []);
      renderMonth();
      renderAxis();
      renderSchedule();
    };
    init();
    if (monthPrev && monthNext) {
      monthPrev.addEventListener('click', () => {
        currentMonth.setMonth(currentMonth.getMonth() - 1);
        renderMonth();
      });
      monthNext.addEventListener('click', () => {
        currentMonth.setMonth(currentMonth.getMonth() + 1);
        renderMonth();
      });
    }
    if (weekPrev && weekNext) {
      weekPrev.addEventListener('click', () => {
        currentWeek.setDate(currentWeek.getDate() - 7);
        renderAxis();
        renderSchedule();
      });
      weekNext.addEventListener('click', () => {
        currentWeek.setDate(currentWeek.getDate() + 7);
        renderAxis();
        renderSchedule();
      });
    }
  </script>
</body>
</html>
